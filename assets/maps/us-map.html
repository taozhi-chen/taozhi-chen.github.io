<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Map</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #us-map-chart {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="us-map-chart"></div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script>
    async function initUSMap() {
      const chartDom = document.getElementById("us-map-chart");
      const myChart = echarts.init(chartDom);

      const visitedStates = [
          "California",
          "Georgia",
          "New York",
          "District of Columbia",
          "Florida",
          "Texas",
      ];

      const data = visitedStates.map(name => ({
        name,
        value: 1
      }));

      const response = await fetch("/assets/maps/us-states.json");
      if (!response.ok) {
        throw new Error("Failed to load local us-states.json");
      }
      const usJson = await response.json();

      echarts.registerMap("usa", usJson);

      const option = {
        tooltip: {
          trigger: "item",
          formatter: function (params) {
            if (params.value === 1) {
              return params.name;
            }
            return "";
          }
        },
        visualMap: {
          min: 0,
          max: 1,
          show: false,
          inRange: {
            color: ["#F2F4F1", "#7F9B87"]
          }
        },
        series: [
          {
            type: "map",
            map: "usa",
            roam: false,
            itemStyle: {
              borderColor: "#FFFFFF",
              borderWidth: 0.8
            },
            emphasis: {
              label: { show: false },
              itemStyle: {
                areaColor: "#6C8773"
              }
            },
            data: data
          }
        ]
      };

      myChart.setOption(option);
      window.addEventListener("resize", () => myChart.resize());
    }

    initUSMap().catch(err => {
      document.body.innerHTML =
        "<pre style='padding:16px;color:#b00020;'>Map failed to load:\n" +
        err +
        "</pre>";
      console.error(err);
    });
  </script>
</body>
</html>
