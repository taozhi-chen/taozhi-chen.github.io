<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Europe Map</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #europe-map-chart {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="europe-map-chart"></div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script>
    async function initEuropeMap() {
      const chartDom = document.getElementById("europe-map-chart");
      const myChart = echarts.init(chartDom);

      const visitedCountries = [
        "United Kingdom",
        "France",
        "Italy",
        "Spain",
        "Portugal",
        "Switzerland",
        "Croatia",
        "Iceland",
        "Norway",
        "Hungary",
        "Austria"
      ];

      const response = await fetch("/assets/maps/europe.json");
      if (!response.ok) {
        throw new Error("Failed to load local europe.json");
      }
      const europeJson = await response.json();

      // 关键：强制把 NAME 复制成 name
      europeJson.features.forEach(f => {
        if (f.properties && f.properties.NAME) {
          f.properties.name = f.properties.NAME;
        }
      });

      echarts.registerMap("europe", europeJson);

      const allCountryNames = europeJson.features.map(f => f.properties.name);

      const data = allCountryNames.map(name => ({
        name,
        value: visitedCountries.includes(name) ? 1 : 0,
        itemStyle: {
          areaColor: visitedCountries.includes(name) ? "#7F9B87" : "#F2F4F1"
        }
      }));

      const option = {
        tooltip: {
          trigger: "item",
          formatter: function (params) {
            if (params.value === 1) {
              return params.name;
            }
            return "";
          }
        },
        series: [
          {
            type: "map",
            map: "europe",
            roam: false,
            itemStyle: {
              areaColor: "#F2F4F1",
              borderColor: "#FFFFFF",
              borderWidth: 0.8
            },
            emphasis: {
              label: { show: false },
              itemStyle: {
                areaColor: "#6C8773"
              }
            },
            data: data
          }
        ]
      };

      myChart.setOption(option);
      window.addEventListener("resize", () => myChart.resize());
    }

    initEuropeMap().catch(err => {
      document.body.innerHTML =
        "<pre style='padding:16px;color:#b00020;'>Map failed to load:\n" +
        err +
        "</pre>";
      console.error(err);
    });
  </script>
</body>
</html>
