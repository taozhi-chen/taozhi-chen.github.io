short_bio: >-
  <p>
    I am currently a Research Assistant at the College of AI, Tsinghua University. Before this, I held research positions at Peking University and Microsoft. I received my MSc in Data Science and Machine Learning from Imperial College London.
  </p>
  <p>
    My research interests lie in large language models, multi-agent systems, reasoning, reinforcement learning, and reliable AI. I am particularly interested in building intelligent systems that can reason, interact, and operate robustly in complex real-world environments.
  </p>

